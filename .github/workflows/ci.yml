name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend-h2:
    name: Backend (H2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: mvn test
        working-directory: backend
        run: mvn -B test

  backend-postgres-it:
    name: Backend (PostgreSQL/Testcontainers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: mvn verify -Ppostgres-it
        working-directory: backend
        run: mvn -B verify -Ppostgres-it

  frontend:
    name: Frontend (build + lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        working-directory: frontend
        run: npm ci

      - name: npm run build
        working-directory: frontend
        run: npm run build

      - name: npm run lint
        working-directory: frontend
        run: npm run lint
