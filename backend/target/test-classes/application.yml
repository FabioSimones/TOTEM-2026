# ===========================================================
# Configuração de testes — substitui application.yml principal
# durante a execução de `mvn test`
#
# Os testes unitários (Mockito puro, sem @SpringBootTest) não usam nenhuma
# propriedade daqui. TotemApplicationTests.contextLoads é o único teste que
# sobe o contexto Spring completo — por isso ele precisa de um banco real
# (H2 em memória, TASK-057) para satisfazer os beans JPA (ex.: UsuarioRepository,
# exigido por CustomUserDetailsService -> JwtAuthenticationFilter -> SecurityConfig).
# Flyway continua desativado: as migrations usam sintaxe específica do PostgreSQL
# (SERIAL/BIGSERIAL) incompatível com H2; o schema é gerado via ddl-auto a partir
# das entidades JPA, suficiente para validar que o contexto sobe.
# ===========================================================

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration
  datasource:
    url: jdbc:h2:mem:totem_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        # Mesma padronização de fuso do application.yml principal (TASK-079) — mantém os testes
        # consistentes com produção; o fuso padrão da JVM já é fixado em UTC via bloco estático
        # em TotemApplication, que roda também no bootstrap do @SpringBootTest.
        jdbc:
          time_zone: UTC

  jackson:
    time-zone: UTC

# Este arquivo SUBSTITUI (não estende) o application.yml principal durante os testes —
# por isso as propriedades abaixo, usadas via @Value no contexto Spring (JwtService,
# WebConfig, UploadImagemService, SecurityConfig), precisam de valor próprio aqui, mesmo
# não sendo exercitadas por nenhuma regra de negócio neste teste (contextLoads só valida
# que o contexto sobe). Segredo puramente fictício, nunca usado para assinar tokens reais.
app:
  security:
    jwt:
      secret: chave-fake-de-teste-nao-usar-em-producao-totem-fast-food-contextloads
      expiration-minutes: 60
      refresh-expiration-days: 7
      operador-expiration-minutes: 30
    login-rate-limit:
      # Valor baixo só para o teste de MockMvc (AuthLoginRateLimitTest) não precisar de muitas
      # requisições para atingir o bloqueio. A expiração do bloqueio em si é testada com Clock
      # controlado em LoginAttemptServiceTest (unitário puro), não aqui.
      max-failures: 3
      block-minutes: 1
    cors:
      # TASK-098: SecurityConfig.corsConfigurationSource() é sempre instanciado (não é condicional
      # como o bootstrap de SUPER_ADMIN) — sem esta propriedade, todo teste @SpringBootTest falharia
      # ao subir o contexto. Mesmas origens de desenvolvimento local, só para satisfazer o bean;
      # nenhum teste hoje exercita CORS via essas origens especificamente (ver CorsConfigurationIntegrationTest).
      allowed-origins: http://localhost:5173,http://localhost:5174
  uploads:
    dir: target/test-uploads
    public-path: /uploads
  pedidos:
    expiracao:
      # Job desligado nos testes de integração: evita expirar pedidos criados durante os cenários
      # (ex.: FluxoOperacionalMvpIntegrationTest) só porque a execução do teste demorou alguns
      # segundos. PedidoExpiracaoServiceTest testa a regra isoladamente, com Clock controlado.
      minutos: 30
      job-enabled: false
      job-fixed-delay-ms: 60000
  dispositivos:
    online-recente-minutos: 5

# TASK-099: mesma exposição mínima do application.yml principal — os testes de integração de
# segurança (ActuatorSecurityIntegrationTest) validam o comportamento contra este perfil.
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
  info:
    env:
      enabled: true

info:
  app:
    name: totem-fast-food
    description: Sistema de Totem de Autoatendimento para Fast Food

logging:
  level:
    com.totem.fastfood: WARN
    org.springframework: WARN
