spring:
  application:
    name: totem-fast-food

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:totem_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      pool-name: TotemHikariPool

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

app:
  security:
    jwt:
      # ATENÇÃO: em produção, JWT_SECRET deve vir de variável de ambiente,
      # nunca deve usar o valor padrão de desenvolvimento abaixo.
      secret: ${JWT_SECRET:uma-chave-local-de-desenvolvimento-com-tamanho-suficiente-para-hmac-sha256}
      expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  default-produces-media-type: application/json

logging:
  level:
    com.totem.fastfood: DEBUG
    org.springframework.security: INFO
    org.springframework.web: INFO
    org.flywaydb: INFO
