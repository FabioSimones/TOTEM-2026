spring:
  application:
    name: totem-fast-food

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:totem_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      pool-name: TotemHikariPool

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        # Padronização de fuso horário (TASK-079): o JDBC/Hibernate interpreta e grava valores
        # temporais como UTC. Complementa (não substitui) o fuso padrão da JVM já fixado em UTC
        # em TotemApplication — ver o Javadoc de lá para a causa raiz do achado que motivou isto.
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

  # TASK-079: sem efeito prático nos campos LocalDateTime hoje (não carregam timezone, então o
  # Jackson serializa igual independente disso) — mantido só como declaração explícita da
  # intenção/documentação, e por segurança caso o projeto passe a usar Instant/OffsetDateTime.
  jackson:
    time-zone: UTC

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

app:
  security:
    jwt:
      # TASK-097: sem fallback — JWT_SECRET é obrigatório em qualquer ambiente (inclusive dev
      # local), com no mínimo 32 caracteres. Sem a variável definida, a aplicação falha no
      # startup com mensagem clara (JwtSecretValidator) em vez de assinar tokens com um segredo
      # conhecido publicamente neste repositório. Ver docs/04-seguranca.md.
      secret: ${JWT_SECRET:}
      expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}
      refresh-expiration-days: ${JWT_REFRESH_EXPIRATION_DAYS:7}
      # Token de operador (TASK-092): curto, sem refresh — só identifica quem está no terminal
      # agora, para auditoria (HistoricoStatusPedido.alteradoPorUsuario). Não substitui o token
      # de dispositivo, que continua sendo a autenticação principal de Caixa/Cozinha.
      operador-expiration-minutes: ${JWT_OPERADOR_EXPIRATION_MINUTES:30}
    login-rate-limit:
      # Rate limiting em memória (TASK-065) — reinicia ao reiniciar a aplicação; não substitui
      # um WAF/proxy/rate limiting de borda em produção.
      max-failures: ${LOGIN_RATE_LIMIT_MAX_FAILURES:5}
      block-minutes: ${LOGIN_RATE_LIMIT_BLOCK_MINUTES:15}
    cors:
      # TASK-098: sem fallback — CORS_ALLOWED_ORIGINS é obrigatório em qualquer ambiente (inclusive
      # dev local), lista separada por vírgula (ex.: http://localhost:5173,http://localhost:5174).
      # "*" nunca é aceito (CorsOriginsValidator). Sem a variável definida, a aplicação falha no
      # startup com mensagem clara em vez de subir com a lista vazia (bloqueando tudo em silêncio)
      # ou aceitando qualquer origem. Ver docs/04-seguranca.md.
      allowed-origins: ${CORS_ALLOWED_ORIGINS:}
  bootstrap:
    super-admin:
      # Desligado por padrão (TASK-096) — a V7 desativou o antigo seed de senha fixa das
      # migrations V4/V5. Para criar o primeiro SUPER_ADMIN de um ambiente novo (ou reativar
      # um ambiente onde o seed antigo foi desativado), habilite explicitamente e informe
      # e-mail/senha via variável de ambiente. NUNCA definir um valor padrão de senha aqui —
      # ligar sem SUPER_ADMIN_EMAIL/SUPER_ADMIN_PASSWORD falha o startup de propósito. Ver
      # docs/04-seguranca.md.
      enabled: ${SUPER_ADMIN_BOOTSTRAP_ENABLED:false}
      email: ${SUPER_ADMIN_EMAIL:}
      password: ${SUPER_ADMIN_PASSWORD:}
  uploads:
    # Armazenamento local em disco — adequado para o MVP. Em produção,
    # substituir por storage externo (S3, Cloudinary ou equivalente).
    dir: ${UPLOAD_DIR:uploads}
    public-path: /uploads
  pedidos:
    expiracao:
      # Expiração automática de pedidos não pagos (TASK-070): CRIADO, AGUARDANDO_PAGAMENTO e
      # AGUARDANDO_PAGAMENTO_DINHEIRO criados há mais de `minutos` viram EXPIRADO. Nunca afeta
      # pedidos pagos ou em fluxo operacional (PAGO em diante).
      minutos: ${PEDIDO_EXPIRACAO_MINUTOS:30}
      job-enabled: ${PEDIDO_EXPIRACAO_JOB_ENABLED:true}
      job-fixed-delay-ms: ${PEDIDO_EXPIRACAO_JOB_DELAY_MS:60000}
  dispositivos:
    # Status operacional derivado (TASK-077, sem WebSocket/heartbeat): dispositivo com
    # ultimoAcesso dentro dos últimos `online-recente-minutos` aparece como USADO_RECENTEMENTE.
    online-recente-minutos: ${DISPOSITIVO_ONLINE_RECENTE_MINUTOS:5}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  default-produces-media-type: application/json

# TASK-099: observabilidade mínima. Só health e info ficam expostos — qualquer outro endpoint do
# Actuator (env, beans, metrics, loggers, threaddump, heapdump...) não tem exposure habilitado,
# então nem chega a existir como rota no Spring MVC. show-details=never evita vazar detalhes de
# componentes internos (ex.: status do datasource) para quem só tem acesso ao /actuator/health
# público — ver SecurityConfig e docs/04-seguranca.md.
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
  info:
    env:
      # Sem isso, o /actuator/info não expõe as propriedades info.* abaixo (desligado por padrão
      # desde o Spring Boot 2.5) — nada além delas é exposto, então não há risco de vazar env vars.
      enabled: true

info:
  app:
    name: totem-fast-food
    description: Sistema de Totem de Autoatendimento para Fast Food

logging:
  level:
    com.totem.fastfood: DEBUG
    org.springframework.security: INFO
    org.springframework.web: INFO
    org.flywaydb: INFO
