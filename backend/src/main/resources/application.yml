spring:
  application:
    name: totem-fast-food

  # ===========================================================
  # BANCO DE DADOS — será habilitado na TASK-005
  # Descomente e configure ao executar TASK-005 (PostgreSQL + Flyway)
  # ===========================================================
  #
  # datasource:
  #   url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:totem_db}
  #   username: ${DB_USERNAME:postgres}
  #   password: ${DB_PASSWORD:postgres}
  #   driver-class-name: org.postgresql.Driver
  #   hikari:
  #     maximum-pool-size: 10
  #     minimum-idle: 2
  #     connection-timeout: 30000
  #
  # jpa:
  #   hibernate:
  #     ddl-auto: none
  #   show-sql: false
  #   open-in-view: false
  #   properties:
  #     hibernate:
  #       dialect: org.hibernate.dialect.PostgreSQLDialect
  #       format_sql: true
  #
  # flyway:
  #   enabled: true
  #   locations: classpath:db/migration
  #   baseline-on-migrate: true
  # ===========================================================

  autoconfigure:
    exclude:
      # Temporário: banco será configurado na TASK-005
      # Remova estas exclusões ao habilitar o datasource acima
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  default-produces-media-type: application/json

logging:
  level:
    com.totem.fastfood: DEBUG
    org.springframework.security: INFO
    org.springframework.web: INFO
